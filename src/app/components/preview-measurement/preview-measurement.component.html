<div class="viewer-page">
  <div class="toolbar">
    <button (click)="zoomOut()">−</button>
    <button (click)="zoomIn()">+</button>
    <button (click)="resetView()">Reset View</button>

    <label class="upload">
      Choose File
      <input
        type="file"
        accept=".jpg,.jpeg,.png"
        (change)="onFileSelected($event)"
        hidden
      />
    </label>

    <span class="status">{{ fileName }}</span>
  </div>

  <div class="viewer">
    <div *ngIf="!imageUrl" class="drop-zone">
      Drag & Drop measurement image here<br />
      Supported: JPG or PNG
    </div>

    <img
      *ngIf="imageUrl"
      [src]="imageUrl"
      alt="Measurement Preview"
      class="measurement-image"
      [style.transform]="'scale(' + zoom + ')'"
    />
  </div>
</div>
